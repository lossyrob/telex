name: Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
          - target: aarch64-pc-windows-msvc
            os: windows-11-arm
            archive: zip
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-15-intel
            archive: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - name: Install Linux TLS dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Build release binary
        # Batteries-included published binary: all backends + Entra auth.
        run: cargo build --release --target ${{ matrix.target }} --features entra

      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $target = "${{ matrix.target }}"
          $archive = "telex-$tag-$target.zip"
          New-Item -ItemType Directory -Force -Path dist, package | Out-Null
          Copy-Item "target\$target\release\telex.exe" "package\telex.exe" -Force
          Copy-Item "LICENSE" "package\LICENSE" -Force
          New-Item -ItemType Directory -Force -Path "package\copilot-plugin" | Out-Null
          Copy-Item "plugin.json" "package\copilot-plugin\plugin.json" -Force
          Copy-Item "hooks.json" "package\copilot-plugin\hooks.json" -Force
          Copy-Item "skills" "package\copilot-plugin\skills" -Recurse -Force
          Compress-Archive -Path "package\*" -DestinationPath "dist\$archive" -Force
          $hash = (Get-FileHash "dist\$archive" -Algorithm SHA256).Hash.ToLower()
          "$hash  $archive" | Out-File -Encoding ascii -NoNewline "dist\$archive.sha256"

      - name: Package Unix binary
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ github.ref_name }}"
          target="${{ matrix.target }}"
          archive="telex-${tag}-${target}.tar.gz"
          mkdir -p dist package
          cp "target/${target}/release/telex" package/telex
          cp LICENSE package/LICENSE
          mkdir -p package/copilot-plugin
          cp plugin.json package/copilot-plugin/plugin.json
          cp hooks.json package/copilot-plugin/hooks.json
          cp -R skills package/copilot-plugin/skills
          tar -C package -czf "dist/${archive}" telex LICENSE copilot-plugin
          ( cd dist && shasum -a 256 "${archive}" > "${archive}.sha256" )

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: telex-${{ github.ref_name }}-${{ matrix.target }}
          path: dist/telex-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive }}*
          if-no-files-found: error

      - name: Publish GitHub Release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/telex-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive }}
            dist/telex-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive }}.sha256
