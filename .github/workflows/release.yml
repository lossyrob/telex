name: Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:

# No workflow-level write permission: only the publish job needs `contents: write`
# (least privilege). build/verify-version run with the default read-only token.

jobs:
  verify-version:
    name: Verify tag matches Cargo.toml version
    # Guards the #1 predicted release incident: a vX.Y.Z tag shipping a binary that
    # self-identifies as a different version (breaks upgrade tooling / the downstream
    # release-upgrade node). Only runs on real tag pushes; a workflow_dispatch (even
    # if pointed at a tag ref) is a build-only dry-run and never reaches publish.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compare tag to Cargo.toml version
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          # Read [package].version specifically, so a future [workspace.package]
          # block cannot shadow it.
          crate="$(awk '/^\[/{inpkg=0} /^\[package\]/{inpkg=1} inpkg && /^version[[:space:]]*=/{gsub(/["[:space:]]/,"",$0); sub(/^version=/,""); print; exit}' Cargo.toml)"
          if [ -z "${crate}" ]; then
            echo "::error::could not read [package].version from Cargo.toml"
            exit 1
          fi
          if [ "${tag}" != "${crate}" ]; then
            echo "::error::release tag v${tag} does not match Cargo.toml version ${crate}; bump Cargo.toml (and Cargo.lock) before tagging"
            exit 1
          fi
          echo "release tag v${tag} matches Cargo.toml version ${crate}"

  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    # Runs in parallel with verify-version (and on workflow_dispatch, where
    # verify-version is skipped). A mismatched tag still cannot publish because the
    # publish job needs verify-version to succeed; the only cost is a wasted build.
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
          - target: aarch64-pc-windows-msvc
            os: windows-11-arm
            archive: zip
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-15-intel
            archive: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute asset version
        id: ver
        shell: bash
        run: |
          # github.ref_name is the tag on a release (vX.Y.Z) or the branch on a
          # workflow_dispatch dry-run (which may contain '/'). Sanitize '/' -> '-' so
          # asset paths are always valid; on a real tag push this is a no-op.
          echo "v=${GITHUB_REF_NAME//\//-}" >> "$GITHUB_OUTPUT"

      - name: Install Rust stable
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - name: Install Linux TLS dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Build release binary
        # Batteries-included published binary: all backends + Entra auth.
        run: cargo build --release --target ${{ matrix.target }} --features entra

      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tag = "${{ steps.ver.outputs.v }}"
          $target = "${{ matrix.target }}"
          $archive = "telex-$tag-$target.zip"
          New-Item -ItemType Directory -Force -Path dist, package | Out-Null
          Copy-Item "target\$target\release\telex.exe" "package\telex.exe" -Force
          Copy-Item "LICENSE" "package\LICENSE" -Force
          Compress-Archive -Path "package\*" -DestinationPath "dist\$archive" -Force
          $hash = (Get-FileHash "dist\$archive" -Algorithm SHA256).Hash.ToLower()
          "$hash  $archive" | Out-File -Encoding ascii -NoNewline "dist\$archive.sha256"

      - name: Package Unix binary
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.ver.outputs.v }}"
          target="${{ matrix.target }}"
          archive="telex-${tag}-${target}.tar.gz"
          mkdir -p dist package
          cp "target/${target}/release/telex" package/telex
          cp LICENSE package/LICENSE
          tar -C package -czf "dist/${archive}" telex LICENSE
          ( cd dist && shasum -a 256 "${archive}" > "${archive}.sha256" )

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: telex-${{ steps.ver.outputs.v }}-${{ matrix.target }}
          path: dist/telex-${{ steps.ver.outputs.v }}-${{ matrix.target }}.${{ matrix.archive }}*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: [verify-version, build]
    runs-on: ubuntu-latest
    # Only this job needs write access to create the release (least privilege).
    permissions:
      contents: write
    # Atomic publish: only after ALL matrix legs succeed, and only on a real version
    # tag PUSH. This prevents a partial, publicly-visible "Latest" release missing a
    # platform's assets (which would break that platform's installer). A
    # workflow_dispatch runs the build matrix for validation but never reaches this
    # job -- even if it is pointed at a tag ref -- because of the event_name guard.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release with all assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/telex-${{ github.ref_name }}-*
