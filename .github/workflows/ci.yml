name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-test:
    name: Build and test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Install Linux TLS dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Build
        run: cargo build --verbose

      - name: Test
        run: cargo test --verbose

      - name: Check formatting
        continue-on-error: true
        run: cargo fmt --check

      - name: Run Clippy
        continue-on-error: true
        run: cargo clippy -- -D warnings

  feature-check:
    name: Feature combinations build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install Linux TLS dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Build sqlite-only
        run: cargo build --no-default-features --features sqlite

      - name: Build postgres-only
        run: cargo build --no-default-features --features postgres

      - name: Build default (all backends)
        run: cargo build
