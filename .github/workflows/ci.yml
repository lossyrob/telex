name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-test:
    name: Build and test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check embedded bridge JS syntax
        run: node --check copilot/bridge/extension.mjs

      - name: Test embedded bridge busy/idle contract
        run: node --test copilot/bridge/busy-state.test.mjs

      - name: Install Rust stable
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Install Linux TLS dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Build
        run: cargo build --workspace --verbose

      - name: Test
        run: cargo test --workspace --verbose

      - name: Check formatting
        continue-on-error: true
        run: cargo fmt --check

      - name: Run Clippy
        continue-on-error: true
        run: cargo clippy --workspace -- -D warnings

  copilot-fallback:
    name: Copilot fallback E2E (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Exercise generated fallback launcher
        run: cargo test --no-default-features --features sqlite --test daemon_process_sqlite copilot_fallback

  feature-check:
    name: Feature combinations build
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: -D warnings
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install Linux TLS dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Build sqlite-only
        run: cargo build --no-default-features --features sqlite

      - name: Build postgres-only
        run: cargo build --no-default-features --features postgres

      - name: Build entra (Azure SDK)
        run: cargo build --features entra

      - name: Build default (all backends)
        run: cargo build

      - name: Build sqlite + self-update (lean self-updater combo)
        run: cargo build --no-default-features --features "sqlite,self-update"

      - name: Release-upgrade fallback error when self-update is compiled out
        # A build without `self-update` must reject `telex upgrade` (no --from) with an
        # actionable error AND a non-zero exit. Assert both, so a regression where the stub
        # prints the message but returns Ok(0) fails CI instead of silently defeating fail-closed.
        run: |
          set -o pipefail
          if out="$(cargo run --no-default-features --features sqlite -- upgrade 2>&1)"; then
            echo "$out"
            echo "::error::compiled-out telex upgrade unexpectedly exited 0 (should fail closed)"
            exit 1
          fi
          echo "$out"
          echo "$out" | grep -q "compiled without release-upgrade support" || {
            echo "::error::sqlite-only build did not emit the compiled-out upgrade fallback error"
            exit 1
          }

      - name: Core stays lean (no TUI deps in `telex`)
        run: |
          if cargo tree -p telex -e normal | grep -Eq 'ratatui|crossterm'; then
            echo "ERROR: core telex crate pulled in a TUI dependency (ratatui/crossterm)"
            cargo tree -p telex -e normal | grep -E 'ratatui|crossterm'
            exit 1
          fi
          echo "ok: core telex has no ratatui/crossterm"

  postgres-live:
    name: Live Postgres parity tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install Linux TLS dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Run live Postgres proof tests
        env:
          TELEX_PG_URL: postgres://postgres:postgres@127.0.0.1:5432/postgres
          TELEX_PG_REQUIRE: "1"
        run: cargo test --all-features --test conformance --test daemon_core_postgres
